<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theory Test</title>

    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="./lib/katex/katex.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #222;
        }

        h1 {
            margin-bottom: 20px;
        }

        .formula-block {
            margin: 20px 0;
            padding: 12px 16px;
            background: #f7f7f7;
            border-left: 4px solid #4a90e2;
        }
    </style>
</head>
<body>
<h1>Theory Page Test</h1>

<p>
    This is a simple test for KaTeX rendering.
    We use an inline formula such as $a^2 + b^2 = c^2$ inside a sentence.
</p>

<div class="formula-block">
    $$
    P = \frac{2L}{\pi D}
    $$
</div>

<p>
    If both the inline formula and the displayed formula are rendered correctly,
    then the KaTeX library has been loaded successfully.
</p>

<!-- KaTeX JS -->
<script src="./lib/katex/katex.js"></script>

<!-- Auto-render extension -->
<script src="./lib/katex/contrib/auto-render.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        renderMathInElement(document.body, {
            delimiters: [
                { left: "$$", right: "$$", display: true },
                { left: "$", right: "$", display: false }
            ],
            throwOnError: false
        });
    });
</script>
</body>
</html>
